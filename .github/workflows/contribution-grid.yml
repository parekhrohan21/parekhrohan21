name: Generate Contribution Grid

on:
  schedule:
    # Runs every 24 hours at midnight UTC — auto-syncs with new commits
    - cron: "0 0 * * *"
  workflow_dispatch: # Allow manual trigger
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate contribution graphs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake-dark.gif?palette=github-dark&color_snake=00EA64

      - name: Push generated files
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
